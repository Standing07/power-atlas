# 每月自動更新資料：下載最新 OWID/IRENA 資料 → 驗證 → 通過才提交
# 驗證失敗時 workflow 會標紅，但網站保持舊資料，不會壞掉。
name: Update data

on:
  schedule:
    - cron: '0 3 5 * *' # 每月 5 日 03:00 UTC
  workflow_dispatch: {} # 也可以在 GitHub 網頁上手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run data pipeline with validation
        run: npm run data -- --force
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: monthly data refresh (validated)"
            git push
          fi
